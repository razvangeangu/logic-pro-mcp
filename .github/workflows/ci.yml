name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the build job only reads the repo. Declaring the scope here
# (release.yml / publish-mcp.yml already pin theirs) drops the default token
# from read/write to read-only for every job in this workflow.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode
        # Xcode 16.4 ships Swift 6.2 — required by swift-sdk 0.11.0+ which
        # adopts the short-form `withThrowingTaskGroup { ... }` syntax. The
        # previous 16.2 pin (Swift 6.0) cannot compile that form.
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build
        run: swift build -c release

      - name: Coverage report
        # H-4 (2026-05-08 enterprise review) closed in v3.4.0: re-armed
        # the coverage gate. Pre-fix this step disabled shell error handling
        # and exited successfully, so coverage regressions never blocked
        # a merge — exactly the bug the previous review caught.
        #
        # The step now runs in TWO phases:
        #   1. Generate the report fail-closed: the coverage test command,
        #      profdata lookup, llvm-cov report, and threshold parser must all
        #      succeed. LLVM runtime profile warnings are surfaced, but are not
        #      treated as the gate by themselves because GitHub's macOS runner
        #      can emit recoverable child-process profile warnings while still
        #      producing a valid default.profdata.
        #   2. Enforce thresholds (this is the actual gate).
        #
        # Hard thresholds: 70% region, 78% line. 90% line coverage is the
        # project target, but not the hard gate until a dedicated coverage
        # uplift lands; setting 90% today would only make every release red.
        if: always()
        run: |
          set -euo pipefail
          PROFRAW_DIR="$RUNNER_TEMP/logicpromcp-profraw"
          COVERAGE_LOG="$RUNNER_TEMP/logicpromcp-coverage.log"
          mkdir -p "$PROFRAW_DIR"
          export LLVM_PROFILE_FILE="$PROFRAW_DIR/%m-%p.profraw"

          swift test --enable-code-coverage -Xswiftc -suppress-warnings --no-parallel 2>&1 | tee "$COVERAGE_LOG"
          PROFILE_WARNING_COUNT=$(grep -c "LLVM Profile Error" "$COVERAGE_LOG" || true)
          if [ "$PROFILE_WARNING_COUNT" != "0" ]; then
            echo "::warning::LLVM profile runtime reported $PROFILE_WARNING_COUNT warning(s); continuing to profdata/report validation."
            echo "::warning::LLVM_PROFILE_FILE=$LLVM_PROFILE_FILE"
          fi

          # v3.4.3: locate the test binary + profdata via `find` instead of
          # the `.build/debug/...` symlink path. The symlink exists on local
          # arm64 Macs but its presence under the macos-15-arm64 GitHub
          # runner is not guaranteed across SwiftPM versions; an absent
          # symlink silently produces an empty coverage report. `find`
          # against the actual `.build/arm64-apple-macosx/debug/` tree is
          # path-version-stable.
          BIN=$(find .build -type f -path '*/debug/LogicProMCPPackageTests.xctest/Contents/MacOS/LogicProMCPPackageTests' | head -1)
          PROFDATA=$(find .build -type f -path '*/debug/codecov/default.profdata' | head -1)
          echo "Test binary: $BIN"
          echo "Profdata:    $PROFDATA"
          if [ -z "$BIN" ] || [ -z "$PROFDATA" ]; then
            echo "::error::Could not locate test binary or profdata; coverage gate cannot run."
            echo "::error::.build tree:"
            find .build -maxdepth 4 -type d | head -30
            exit 1
          fi

          find Sources/LogicProMCP -name '*.swift' | sort > /tmp/logicpro_sources.txt
          xargs xcrun llvm-cov report "$BIN" -instr-profile "$PROFDATA" \
            < /tmp/logicpro_sources.txt > coverage-report.txt
          echo "::group::Full coverage report"
          cat coverage-report.txt
          echo "::endgroup::"

          # Extract TOTAL line — llvm-cov column order: regions, missed,
          # cover%, functions, missed, cover%, lines, missed, cover%.
          # v3.4.1 (Boomer P2-4): validate extracted values match the
          # `<float>%` shape before threshold compare. A future LLVM
          # version that prepends a column (e.g. instantiation summary
          # in TOTAL) would silently grab a different field; the regex
          # guard below makes that fail-loud instead.
          TOTAL_LINE=$(grep -E "^TOTAL" coverage-report.txt || true)
          REGION_RAW=$(echo "$TOTAL_LINE" | awk '{print $4}')
          LINE_RAW=$(echo "$TOTAL_LINE" | awk '{print $10}')
          if ! echo "$REGION_RAW" | grep -qE '^[0-9]+\.[0-9]+%$'; then
            echo "::error::Region coverage field '$REGION_RAW' did not match <float>% pattern."
            echo "::error::TOTAL line was: $TOTAL_LINE"
            echo "::error::This usually means llvm-cov column order changed; review the awk extraction."
            exit 1
          fi
          if ! echo "$LINE_RAW" | grep -qE '^[0-9]+\.[0-9]+%$'; then
            echo "::error::Line coverage field '$LINE_RAW' did not match <float>% pattern."
            echo "::error::TOTAL line was: $TOTAL_LINE"
            exit 1
          fi
          REGION_PCT=$(echo "$REGION_RAW" | tr -d '%')
          LINE_PCT=$(echo "$LINE_RAW" | tr -d '%')

          {
            echo "## Coverage report"
            echo ""
            echo '```'
            echo "$TOTAL_LINE"
            echo '```'
            echo ""
            echo "Hard thresholds: region ≥ 70%, line ≥ 78%."
            echo "Coverage target: line ≥ 90%."
            echo "LLVM profile warnings: ${PROFILE_WARNING_COUNT:-0}."
          } >> "$GITHUB_STEP_SUMMARY"

          MIN_REGION=70
          MIN_LINE=78
          COVERAGE_TARGET=90
          FAIL=0
          if [ -z "$REGION_PCT" ] || [ -z "$LINE_PCT" ]; then
            echo "::error::Could not parse coverage TOTAL line; coverage gate cannot evaluate."
            FAIL=1
          else
            # Bash arithmetic doesn't handle floats; use awk for the comparison.
            REGION_OK=$(awk -v r="$REGION_PCT" -v m="$MIN_REGION" 'BEGIN { print (r+0 >= m+0) ? 1 : 0 }')
            LINE_OK=$(awk -v l="$LINE_PCT" -v m="$MIN_LINE" 'BEGIN { print (l+0 >= m+0) ? 1 : 0 }')
            if [ "$REGION_OK" != "1" ]; then
              echo "::error::Region coverage $REGION_PCT% below threshold $MIN_REGION%."
              FAIL=1
            fi
            if [ "$LINE_OK" != "1" ]; then
              echo "::error::Line coverage $LINE_PCT% below threshold $MIN_LINE%."
              FAIL=1
            fi
            TARGET_OK=$(awk -v l="$LINE_PCT" -v m="$COVERAGE_TARGET" 'BEGIN { print (l+0 >= m+0) ? 1 : 0 }')
            if [ "$TARGET_OK" != "1" ]; then
              echo "::notice::Line coverage $LINE_PCT% is below the 90% target; hard gate remains $MIN_LINE% until coverage uplift lands."
            fi
          fi

          if [ "$FAIL" = "1" ]; then
            exit 1
          fi
          echo "Coverage gate passed: region $REGION_PCT% / line $LINE_PCT%."
