name: Publish MCP Registry Metadata

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  MCP_PUBLISHER_VERSION: v1.7.9

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Sync server.json version from release tag
        if: github.event_name == 'release'
        env:
          # Indirect the release tag through the environment instead of
          # interpolating ${{ github.event.release.tag_name }} straight into the
          # run: block. This job holds id-token:write and runs mcp-publisher
          # login/publish, so a crafted tag_name expanded into the script would
          # be arbitrary code execution under the release-publisher OIDC
          # identity. As an env value the tag reaches the shell as inert data,
          # and the SemVer guard below rejects anything that is not
          # vMAJOR.MINOR.PATCH[-prerelease] (mirrors release.yml's authoritative
          # tag check).
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if ! [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::release tag '$RELEASE_TAG' is not strict SemVer (vMAJOR.MINOR.PATCH[-prerelease])"
            exit 1
          fi
          VERSION="${RELEASE_TAG#v}"
          jq --arg version "$VERSION" '.version = $version' server.json > server.json.tmp
          mv server.json.tmp server.json

      - name: Download MCP Publisher
        run: |
          set -euo pipefail
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          asset="mcp-publisher_${os}_${arch}.tar.gz"
          case "$asset" in
            mcp-publisher_linux_amd64.tar.gz)
              sha256="ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac"
              ;;
            mcp-publisher_linux_arm64.tar.gz)
              sha256="04f5199b3deef8e6fc4d6ed98c56a74f799def53edca3fe6d4862ecd4397c172"
              ;;
            *)
              echo "::error::unsupported mcp-publisher asset for $os/$arch"
              exit 1
              ;;
          esac
          curl -fsSLo "$asset" "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${asset}"
          echo "${sha256}  ${asset}" | sha256sum -c -
          tar xzf "$asset" mcp-publisher
          chmod +x mcp-publisher

      - name: Validate metadata
        run: ./mcp-publisher validate

      - name: Login with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish metadata
        run: ./mcp-publisher publish
