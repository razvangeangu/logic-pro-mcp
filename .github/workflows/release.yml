name: Release

on:
  push:
    # GitHub Actions tag filters are GLOB, not regex — `+` is matched literally
    # rather than as a repetition operator. Use `[0-9]*` (digit followed by any
    # chars) instead of `[0-9]+`. The step-level regex guard below is the
    # authoritative semver enforcement; the glob here just keeps obviously
    # non-release tags (e.g. `vdraft`, `milestone-3`) from reaching the
    # secrets-using steps.
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*-*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Enforce strict SemVer tag
        # Belt-and-suspenders check: the `on.push.tags` glob above keeps the
        # worst-case tags out, but glob can't encode "digits-only before the
        # dots". This regex is the authoritative guard and fails the workflow
        # before any secret-using step runs.
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::tag '$tag' is not strict SemVer (vMAJOR.MINOR.PATCH[-prerelease])"
            exit 1
          fi

      - name: Select Xcode
        # Xcode 16.4 (Swift 6.2) — required by swift-sdk 0.11.0+ short-form
        # withThrowingTaskGroup syntax. Keep in sync with .github/workflows/ci.yml.
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Detect release mode
        id: mode
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          # RB-4 (2026-05-08 enterprise review) closed in v3.4.0: production
          # tags now require notarization. Pre-fix this step silently
          # selected ADHOC mode whenever `MACOS_CERT_BASE64` was missing,
          # so a stable tag like `v3.4.0` could publish a non-notarized
          # binary without anyone noticing.
          #
          # Enterprise release rule:
          #   - Stable tags (no `-prerelease` suffix) require notarization.
          #     Missing secrets → workflow fails before publishing.
          #   - Prerelease tags (`v3.4.0-rc1`, `v3.4.0-beta`, etc.) may
          #     fall back to ADHOC for cheap release candidate cuts.
          #   - There is intentionally no stable ADHOC override.
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ - ]]; then
            tag_kind="prerelease"
          else
            tag_kind="stable"
          fi
          echo "Tag kind: $tag_kind"

          if [ -n "$MACOS_CERT_BASE64" ]; then
            echo "mode=notarized" >> "$GITHUB_OUTPUT"
            echo "Release mode: NOTARIZED (Developer ID + notarization)"
          elif [ "$tag_kind" = "stable" ]; then
            echo "::error::Stable tag '$tag' requires notarization secrets."
            echo "::error::Configure MACOS_CERT_BASE64 and the related notarization secrets."
            echo "::error::Stable ADHOC releases are not permitted."
            exit 1
          else
            echo "mode=adhoc" >> "$GITHUB_OUTPUT"
            echo "Release mode: ADHOC (codesign --sign -; no notarization)"
          fi

      - name: Validate notarization secrets
        if: steps.mode.outputs.mode == 'notarized'
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          required=(
            MACOS_CERT_BASE64
            MACOS_CERT_PASSWORD
            MACOS_SIGNING_IDENTITY
            MACOS_KEYCHAIN_PASSWORD
            APPLE_NOTARY_APPLE_ID
            APPLE_NOTARY_TEAM_ID
            APPLE_NOTARY_APP_PASSWORD
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for a notarized release build"
              exit 1
            fi
          done

      - name: Build universal binary
        # SwiftPM's one-shot multi-arch build (`--arch arm64 --arch x86_64`)
        # has been flaky on Xcode 16.4/macOS-15 runners for this dependency
        # graph, sometimes emitting package-manifest language-version errors
        # and returning non-zero even though most of the underlying xcodebuild
        # work appears to complete. Build each slice separately, then merge
        # them with `lipo` so the release artifact stays truly universal.
        run: |
          find_arch_binary() {
            local build_dir="$1"
            local arch="$2"
            local candidates_file="$RUNNER_TEMP/logicpromcp-${arch}-candidates.txt"
            local candidate=""
            local file_out=""
            local bin=""

            find "$build_dir" -type f -name LogicProMCP -perm -u+x | sort > "$candidates_file"

            if [ ! -s "$candidates_file" ]; then
              echo "::error::No executable LogicProMCP candidates found under $build_dir for $arch"
              exit 1
            fi

            while IFS= read -r candidate; do
              file_out=$(file "$candidate")
              echo "Candidate [$arch]: $candidate"
              echo "$file_out"
              if echo "$file_out" | grep -q "Mach-O" && echo "$file_out" | grep -q "$arch"; then
                bin="$candidate"
                break
              fi
            done < "$candidates_file"

            if [ -z "$bin" ]; then
              echo "::error::No $arch LogicProMCP binary located; candidates below:"
              while IFS= read -r candidate; do
                file "$candidate"
              done < "$candidates_file"
              exit 1
            fi

            rm -f "$candidates_file"
            printf '%s\n' "$bin"
          }

          ARM64_BUILD_DIR="$RUNNER_TEMP/logicpromcp-build-arm64"
          X64_BUILD_DIR="$RUNNER_TEMP/logicpromcp-build-x86_64"
          rm -rf "$ARM64_BUILD_DIR" "$X64_BUILD_DIR"

          swift build -c release --arch arm64 --scratch-path "$ARM64_BUILD_DIR"
          swift build -c release --arch x86_64 --scratch-path "$X64_BUILD_DIR"

          ARM64_BIN=$(find_arch_binary "$ARM64_BUILD_DIR" "arm64")
          X64_BIN=$(find_arch_binary "$X64_BUILD_DIR" "x86_64")

          echo "ARM64 binary: $ARM64_BIN"
          echo "x86_64 binary: $X64_BIN"
          lipo -create -output LogicProMCP "$ARM64_BIN" "$X64_BIN"
          chmod +x LogicProMCP

          FILE_OUT=$(file LogicProMCP)
          echo "$FILE_OUT"
          for need in "Mach-O universal binary" "arm64" "x86_64"; do
            if ! echo "$FILE_OUT" | grep -q "$need"; then
              echo "::error::LogicProMCP missing required slice/type: '$need'"
              exit 1
            fi
          done

      - name: Codesign binary (Developer ID)
        if: steps.mode.outputs.mode == 'notarized'
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$MACOS_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          codesign --force --options runtime --timestamp --sign "$MACOS_SIGNING_IDENTITY" LogicProMCP

      - name: Codesign binary (ADHOC)
        if: steps.mode.outputs.mode == 'adhoc'
        run: |
          codesign --force --sign - LogicProMCP

      - name: Notarize binary
        if: steps.mode.outputs.mode == 'notarized'
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          xcrun notarytool submit LogicProMCP --apple-id "$APPLE_NOTARY_APPLE_ID" --team-id "$APPLE_NOTARY_TEAM_ID" --password "$APPLE_NOTARY_APP_PASSWORD" --wait
          xcrun stapler staple LogicProMCP

      - name: Verify notarized artifact
        if: steps.mode.outputs.mode == 'notarized'
        run: |
          codesign --verify --strict --verbose=2 LogicProMCP
          spctl --assess --type execute LogicProMCP

      - name: Verify adhoc artifact
        if: steps.mode.outputs.mode == 'adhoc'
        run: |
          codesign --verify --strict --verbose=2 LogicProMCP

      - name: Package
        env:
          RELEASE_MODE: ${{ steps.mode.outputs.mode }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          if [ "$RELEASE_MODE" = "notarized" ]; then
            TEAM_ID="$APPLE_NOTARY_TEAM_ID"
            SIGNING="notarized"
          else
            TEAM_ID="ADHOC"
            SIGNING="adhoc"
          fi
          LIPO_OUT=$(lipo -info LogicProMCP 2>/dev/null || true)
          if [ -z "$LIPO_OUT" ]; then
            echo "::error::lipo -info LogicProMCP returned no output"
            exit 1
          fi
          if echo "$LIPO_OUT" | grep -q "Non-fat file"; then
            ARCH_FIELD=$(echo "$LIPO_OUT" | sed -E 's/.*architecture: ([a-zA-Z0-9_]+).*/\1/')
            if [ -z "$ARCH_FIELD" ] || ! echo "$ARCH_FIELD" | grep -qE '^[a-zA-Z0-9_]+$'; then
              echo "::error::Could not parse architecture from lipo output: $LIPO_OUT"
              exit 1
            fi
            ARCH_JSON="[\"$ARCH_FIELD\"]"
          else
            ARCH_LIST=$(echo "$LIPO_OUT" | sed -E 's/.*are: //' | tr ' ' '\n' | grep -v '^$' | sed 's/.*/"&"/' | paste -sd, -)
            if [ -z "$ARCH_LIST" ]; then
              echo "::error::Could not parse fat-file architectures from lipo output: $LIPO_OUT"
              exit 1
            fi
            ARCH_JSON="[$ARCH_LIST]"
          fi
          printf '{"version":"%s","team_id":"%s","signing":"%s","architectures":%s}\n' \
            "$GITHUB_REF_NAME" "$TEAM_ID" "$SIGNING" "$ARCH_JSON" > RELEASE-METADATA.json
          tar czf LogicProMCP-macOS-universal.tar.gz \
            LogicProMCP \
            docs/SETUP.md \
            Scripts/install-keycmds.sh \
            Scripts/uninstall-keycmds.sh \
            Scripts/keycmd-preset.plist \
            Scripts/LogicProMCP-Scripter.js
          # arm64 alias, same universal payload, different filename for
          # backward-compat with taps hardcoded to the older URL.
          cp LogicProMCP-macOS-universal.tar.gz LogicProMCP-macOS-arm64.tar.gz
          shasum -a 256 LogicProMCP-macOS-universal.tar.gz > SHA256SUMS.txt
          shasum -a 256 LogicProMCP-macOS-arm64.tar.gz >> SHA256SUMS.txt
          shasum -a 256 LogicProMCP >> SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          generate_release_notes: true
          files: |
            LogicProMCP
            LogicProMCP-macOS-universal.tar.gz
            LogicProMCP-macOS-arm64.tar.gz
            RELEASE-METADATA.json
            SHA256SUMS.txt

  validate-install:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Validate installer and uninstaller against release asset
        env:
          LOGIC_PRO_MCP_VERSION: ${{ github.ref_name }}
          LOGIC_PRO_MCP_INSTALL_DIR: ${{ runner.temp }}/logic-pro-bin
          LOGIC_PRO_MCP_SKIP_SUDO: "1"
          LOGIC_PRO_MCP_REGISTER_CLAUDE: "0"
          LOGIC_PRO_MCP_INSTALL_KEYCMDS: "1"
          LOGIC_PRO_MCP_KEYCMD_DIR: ${{ runner.temp }}/key-commands
          LOGIC_PRO_MCP_KEYCMD_AUTO_RESTORE: "1"
        run: |
          mkdir -p "$LOGIC_PRO_MCP_INSTALL_DIR"

          # Resolve provenance pins from the just-published release so we're
          # exercising the fail-closed hardened path, not the opt-in
          # same-origin fallback. This simulates what a downstream consumer
          # following README.md §Quick Start Option B would do.
          VERSION="${{ github.ref_name }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/$VERSION"
          LOGIC_PRO_MCP_SHA256=$(curl -fsSL "$BASE/SHA256SUMS.txt" \
              | awk '$2 == "LogicProMCP" {print $1}')
          LOGIC_PRO_MCP_TEAM_ID=$(curl -fsSL "$BASE/RELEASE-METADATA.json" \
              | awk -F'"' '/"team_id"[[:space:]]*:/ {print $4; exit}')
          export LOGIC_PRO_MCP_SHA256 LOGIC_PRO_MCP_TEAM_ID
          echo "Using LOGIC_PRO_MCP_SHA256=$LOGIC_PRO_MCP_SHA256"
          echo "Using LOGIC_PRO_MCP_TEAM_ID=$LOGIC_PRO_MCP_TEAM_ID"

          bash Scripts/install.sh | tee install.log
          test -x "$LOGIC_PRO_MCP_INSTALL_DIR/LogicProMCP"
          bash Scripts/uninstall.sh | tee uninstall.log
          test ! -e "$LOGIC_PRO_MCP_INSTALL_DIR/LogicProMCP"

      - name: Upload install validation evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: install-validation-${{ matrix.os }}
          path: |
            install.log
            uninstall.log
