name: Release

on:
  push:
    # GitHub Actions tag filters are GLOB, not regex — `+` is matched literally
    # rather than as a repetition operator. Use `[0-9]*` (digit followed by any
    # chars) instead of `[0-9]+`. The step-level regex guard below is the
    # authoritative semver enforcement; the glob here just keeps obviously
    # non-release tags (e.g. `vdraft`, `milestone-3`) from reaching the
    # secrets-using steps.
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*-*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Enforce strict SemVer tag
        # Belt-and-suspenders check: the `on.push.tags` glob above keeps the
        # worst-case tags out, but glob can't encode "digits-only before the
        # dots". This regex is the authoritative guard and fails the workflow
        # before any secret-using step runs.
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::tag '$tag' is not strict SemVer (vMAJOR.MINOR.PATCH[-prerelease])"
            exit 1
          fi

      - name: Select Xcode
        # Xcode 16.4 (Swift 6.2) — required by swift-sdk 0.11.0+ short-form
        # withThrowingTaskGroup syntax. Keep in sync with .github/workflows/ci.yml.
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Detect release mode
        id: mode
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
        run: |
          if [ -n "$MACOS_CERT_BASE64" ]; then
            echo "mode=notarized" >> "$GITHUB_OUTPUT"
            echo "Release mode: NOTARIZED (Developer ID + notarization)"
          else
            echo "mode=adhoc" >> "$GITHUB_OUTPUT"
            echo "Release mode: ADHOC (codesign --sign -; no notarization)"
          fi

      - name: Validate notarization secrets
        if: steps.mode.outputs.mode == 'notarized'
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          required=(
            MACOS_CERT_BASE64
            MACOS_CERT_PASSWORD
            MACOS_SIGNING_IDENTITY
            MACOS_KEYCHAIN_PASSWORD
            APPLE_NOTARY_APPLE_ID
            APPLE_NOTARY_TEAM_ID
            APPLE_NOTARY_APP_PASSWORD
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for a notarized release build"
              exit 1
            fi
          done

      - name: Build universal binary
        # Universal swift-pm output path varies by Xcode/Swift version (16.0
        # placed it at `.build/apple/Products/Release/`; 16.4 sometimes lands
        # the executable at a different staging location and the previous
        # hard-coded `cp` failed silently after a successful build, taking the
        # whole release pipeline down with `set -e`). Locate the binary via
        # `find` so future Xcode bumps don't regress this.
        run: |
          swift build -c release --arch arm64 --arch x86_64
          BIN=$(find .build -type f -name LogicProMCP -perm -u+x \
                | grep -iE '/release/' | head -1)
          if [ -z "$BIN" ]; then
            echo "::error::Built LogicProMCP binary not located; tree below:"
            find .build -type f -name LogicProMCP
            exit 1
          fi
          echo "Built binary: $BIN"
          cp "$BIN" LogicProMCP
          chmod +x LogicProMCP
          # Guardant: universal Mach-O 검증 (단일 arch staging 결과를 ship 하면
          # Intel Mac on Rosetta 시 nil-binary 사고). file 출력에서 두 architecture
          # ID 모두 존재해야 PASS — 미만 시 fail-fast.
          file LogicProMCP
          if ! file LogicProMCP | grep -q "Mach-O universal binary"; then
            echo "::error::LogicProMCP is not a universal Mach-O binary"
            exit 1
          fi
          if ! file LogicProMCP | grep -q "arm64"; then
            echo "::error::LogicProMCP missing arm64 slice"
            exit 1
          fi
          if ! file LogicProMCP | grep -q "x86_64"; then
            echo "::error::LogicProMCP missing x86_64 slice"
            exit 1
          fi

      - name: Codesign binary (Developer ID)
        if: steps.mode.outputs.mode == 'notarized'
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$MACOS_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          codesign --force --options runtime --timestamp --sign "$MACOS_SIGNING_IDENTITY" LogicProMCP

      - name: Codesign binary (ADHOC)
        if: steps.mode.outputs.mode == 'adhoc'
        run: |
          codesign --force --sign - LogicProMCP

      - name: Notarize binary
        if: steps.mode.outputs.mode == 'notarized'
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          xcrun notarytool submit LogicProMCP --apple-id "$APPLE_NOTARY_APPLE_ID" --team-id "$APPLE_NOTARY_TEAM_ID" --password "$APPLE_NOTARY_APP_PASSWORD" --wait
          xcrun stapler staple LogicProMCP

      - name: Verify notarized artifact
        if: steps.mode.outputs.mode == 'notarized'
        run: |
          codesign --verify --strict --verbose=2 LogicProMCP
          spctl --assess --type execute LogicProMCP

      - name: Verify adhoc artifact
        if: steps.mode.outputs.mode == 'adhoc'
        run: |
          codesign --verify --strict --verbose=2 LogicProMCP

      - name: Package
        env:
          RELEASE_MODE: ${{ steps.mode.outputs.mode }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          if [ "$RELEASE_MODE" = "notarized" ]; then
            TEAM_ID="$APPLE_NOTARY_TEAM_ID"
            SIGNING="notarized"
          else
            TEAM_ID="ADHOC"
            SIGNING="adhoc"
          fi
          printf '{"version":"%s","team_id":"%s","signing":"%s"}\n' \
            "$GITHUB_REF_NAME" "$TEAM_ID" "$SIGNING" > RELEASE-METADATA.json
          # Universal tarball (arm64 + x86_64 from --arch arm64 --arch x86_64 build)
          tar czf LogicProMCP-macOS-universal.tar.gz \
            LogicProMCP \
            docs/SETUP.md \
            Scripts/install-keycmds.sh \
            Scripts/uninstall-keycmds.sh \
            Scripts/keycmd-preset.plist \
            Scripts/LogicProMCP-Scripter.js
          # arm64 alias — same binary (fat-universal), different name for
          # backward-compat with taps hardcoded to the older URL.
          cp LogicProMCP-macOS-universal.tar.gz LogicProMCP-macOS-arm64.tar.gz
          shasum -a 256 LogicProMCP-macOS-universal.tar.gz > SHA256SUMS.txt
          shasum -a 256 LogicProMCP-macOS-arm64.tar.gz >> SHA256SUMS.txt
          shasum -a 256 LogicProMCP >> SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          generate_release_notes: true
          files: |
            LogicProMCP
            LogicProMCP-macOS-universal.tar.gz
            LogicProMCP-macOS-arm64.tar.gz
            RELEASE-METADATA.json
            SHA256SUMS.txt

  validate-install:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Validate installer and uninstaller against release asset
        env:
          LOGIC_PRO_MCP_VERSION: ${{ github.ref_name }}
          LOGIC_PRO_MCP_INSTALL_DIR: ${{ runner.temp }}/logic-pro-bin
          LOGIC_PRO_MCP_SKIP_SUDO: "1"
          LOGIC_PRO_MCP_REGISTER_CLAUDE: "0"
          LOGIC_PRO_MCP_INSTALL_KEYCMDS: "1"
          LOGIC_PRO_MCP_KEYCMD_DIR: ${{ runner.temp }}/key-commands
          LOGIC_PRO_MCP_KEYCMD_AUTO_RESTORE: "1"
        run: |
          mkdir -p "$LOGIC_PRO_MCP_INSTALL_DIR"

          # Resolve provenance pins from the just-published release so we're
          # exercising the fail-closed hardened path, not the opt-in
          # same-origin fallback. This simulates what a downstream consumer
          # following README.md §Quick Start Option B would do.
          VERSION="${{ github.ref_name }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/$VERSION"
          LOGIC_PRO_MCP_SHA256=$(curl -fsSL "$BASE/SHA256SUMS.txt" \
              | awk '$2 == "LogicProMCP" {print $1}')
          LOGIC_PRO_MCP_TEAM_ID=$(curl -fsSL "$BASE/RELEASE-METADATA.json" \
              | awk -F'"' '/"team_id"[[:space:]]*:/ {print $4; exit}')
          export LOGIC_PRO_MCP_SHA256 LOGIC_PRO_MCP_TEAM_ID
          echo "Using LOGIC_PRO_MCP_SHA256=$LOGIC_PRO_MCP_SHA256"
          echo "Using LOGIC_PRO_MCP_TEAM_ID=$LOGIC_PRO_MCP_TEAM_ID"

          bash Scripts/install.sh | tee install.log
          test -x "$LOGIC_PRO_MCP_INSTALL_DIR/LogicProMCP"
          bash Scripts/uninstall.sh | tee uninstall.log
          test ! -e "$LOGIC_PRO_MCP_INSTALL_DIR/LogicProMCP"

      - name: Upload install validation evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: install-validation-${{ matrix.os }}
          path: |
            install.log
            uninstall.log
