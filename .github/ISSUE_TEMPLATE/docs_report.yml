name: Documentation issue
description: Report missing, stale, confusing, or risky documentation.
title: "Docs: "
labels: ["documentation", "area: docs", "status: needs triage"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I checked the relevant README, docs, changelog, or security policy first.
          required: true

  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation type
      options:
        - Setup or install
        - API reference
        - Troubleshooting
        - Architecture or maintainer guide
        - Security or trust model
        - Release evidence
        - README or marketing claim
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: |
        What is missing, stale, confusing, or potentially misleading?
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: Source of truth
      placeholder: |
        Link to release evidence, source file, issue, PR, or live verification note.
    validations:
      required: true

  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed fix
      placeholder: |
        The docs should say...
    validations:
      required: true
